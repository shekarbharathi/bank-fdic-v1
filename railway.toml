# Backend service only. Do not rely on this file for the **frontend** service: when the frontend
# service Root Directory is `frontend/`, Railway should load `frontend/railway.toml` instead
# (or set Config-as-code to `railway.frontend.toml`), or the frontend may inherit this [build]
# and try to build the backend image (e.g. COPY requirements.txt fails).

# Railway configuration file for backend service
# This helps Railway understand your project structure
# NOTE: If Root Directory is set to "backend", the startCommand should NOT include `cd backend`
#
# Docker build (not Nixpacks): avoids Nixpacks `pip` exit 127. Match dockerfilePath to your
# Railway service Root Directory — see comments on [build].dockerfilePath.

[build]
builder = "DOCKERFILE"
# Use backend/Dockerfile when the service Root Directory is `backend` (typical Railway layout).
# Use Dockerfile.backend from the repo root when the service Root Directory is the monorepo root.
dockerfilePath = "backend/Dockerfile"

[deploy]
# If Root Directory is set to "backend", use this:
startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
# If Root Directory is NOT set (project root), use this instead:
# startCommand = "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Health check (optional)
[healthcheck]
path = "/api/health"
interval = 30
timeout = 10
